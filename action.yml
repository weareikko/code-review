name: code-review
description: >-
  Agent-driven code review for GitHub pull requests. Posts deduplicated inline
  review comments and an upserted summary. (Same engine as the GitLab CI flow,
  published as @weareikko/code-review.)
author: weareikko
branding:
  icon: git-pull-request
  color: blue

inputs:
  model:
    description: >-
      Model to review with, as `provider/modelId` (e.g.
      `anthropic/claude-sonnet-4-5`). Sets `CODE_REVIEW_MODEL`. Required.
    required: true
  api-key:
    description: >-
      API key for the model provider. Passed as `--api-key`. Optional when the
      provider's standard env var (e.g. `ANTHROPIC_API_KEY`, `OPENAI_API_KEY`)
      is already exposed to the step, or for keyless providers (Ollama) and
      ambient credentials (Bedrock/Vertex).
    required: false
    default: ''
  github-token:
    description: >-
      Token used to read the pull request and post the review. Needs
      `pull-requests: write`. Defaults to the automatic workflow token.
    required: false
    default: ${{ github.token }}
  version:
    description: npm version or dist-tag of @weareikko/code-review to run.
    required: false
    default: latest
  node-version:
    description: Node.js version to set up (the CLI requires >=24).
    required: false
    default: '24'
  working-directory:
    description: Directory to run the review in (the checked-out repository).
    required: false
    default: '.'
  args:
    description: >-
      Extra CLI flags forwarded verbatim (e.g.
      `--min-severity warn --posting-mode draft --dry-run`).
    required: false
    default: ''
  checkout:
    description: >-
      Check out the repository (full history) before reviewing. Set to 'false'
      if your job already checked out the code with its own options.
    required: false
    default: 'true'
  fetch-depth:
    description: Checkout depth. 0 (full history) is required for the merge-base diff.
    required: false
    default: '0'

runs:
  using: composite
  steps:
    - name: Check out repository
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@v5
      with:
        fetch-depth: ${{ inputs.fetch-depth }}
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
    - name: Run code-review
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CODE_REVIEW_MODEL: ${{ inputs.model }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        flags=()
        if [ -n "${INPUT_API_KEY}" ]; then
          flags+=(--api-key "${INPUT_API_KEY}")
        fi
        npx --yes "@weareikko/code-review@${INPUT_VERSION}" "${flags[@]}" ${INPUT_ARGS}
