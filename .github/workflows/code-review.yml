name: code-review

# Reusable workflow. Enable in any repo with a tiny caller:
#
#   name: code-review
#   on: { pull_request: }
#   permissions: { contents: read, pull-requests: write }
#   jobs:
#     review:
#       uses: weareikko/code-review/.github/workflows/code-review.yml@0.8.2
#       secrets: inherit
#
# Forwards the entire CODE_REVIEW_* namespace: every org/repo VARIABLE and
# inherited SECRET whose name starts with CODE_REVIEW_ is exported to the CLI
# (requires `secrets: inherit`), which then de-prefixes the non-reserved ones at
# startup. So everything is configured under one namespace at the org level —
# settings (CODE_REVIEW_MODEL / _DEPTH / _MIN_SEVERITY / …), provider credentials
# (CODE_REVIEW_ANTHROPIC_API_KEY → ANTHROPIC_API_KEY), and OpenTelemetry
# (CODE_REVIEW_OTEL + CODE_REVIEW_OTEL_EXPORTER_OTLP_ENDPOINT / _PROTOCOL /
# _HEADERS → OTEL_* + CODE_REVIEW_OTEL_SEMCONV_STABILITY_OPT_IN). New options
# work with no change here; OTel is a no-op unless CODE_REVIEW_OTEL is set.

on:
  workflow_call:
    inputs:
      model:
        description: 'Model as provider/modelId. Defaults to the CODE_REVIEW_MODEL variable.'
        required: false
        type: string
        default: ''
      version:
        description: 'npm version/dist-tag of @weareikko/code-review to run.'
        required: false
        type: string
        default: latest
      node-version:
        required: false
        type: string
        default: '24'
      working-directory:
        required: false
        type: string
        default: '.'
      args:
        description: 'Extra CLI flags forwarded verbatim.'
        required: false
        type: string
        default: ''
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

jobs:
  review:
    name: Review pull request
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      pull-requests: write
    # Same-repo PRs only: forks don't receive secrets on pull_request.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Forward CODE_REVIEW_* config to the CLI
        # GitHub (unlike GitLab CI) does not auto-inject org/repo config as env, and
        # the vars/secrets contexts aren't enumerable inside the composite action —
        # so forward the tool's whole namespace here. Every CODE_REVIEW_* variable
        # and (inherited) secret becomes an env var; the CLI's startup shim then
        # de-prefixes the non-reserved ones (CODE_REVIEW_ANTHROPIC_API_KEY →
        # ANTHROPIC_API_KEY, CODE_REVIEW_OTEL_EXPORTER_OTLP_ENDPOINT →
        # OTEL_EXPORTER_OTLP_ENDPOINT, …). Filtering to CODE_REVIEW_ keeps the tool
        # namespaced and avoids clobbering unrelated org OTEL_*/provider vars.
        env:
          CR_VARS: ${{ toJSON(vars) }}
          CR_SECRETS: ${{ toJSON(secrets) }}
          MODEL_OVERRIDE: ${{ inputs.model }}
        run: |
          emit() {
            jq -r 'to_entries[]
                   | select(.key | test("^CODE_REVIEW_"; "i"))
                   | "\(.key)<<CR_EOF\n\(.value)\nCR_EOF"' <<<"$1" >> "$GITHUB_ENV"
          }
          emit "$CR_VARS"
          emit "$CR_SECRETS"
          # The optional `model` input overrides the CODE_REVIEW_MODEL variable.
          [ -n "$MODEL_OVERRIDE" ] && echo "CODE_REVIEW_MODEL=$MODEL_OVERRIDE" >> "$GITHUB_ENV"
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
      - name: Run code-review
        working-directory: ${{ inputs.working-directory }}
        run: npx --yes "@weareikko/code-review@${{ inputs.version }}" ${{ inputs.args }}
