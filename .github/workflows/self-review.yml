name: self-review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review pull request
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Provider credentials (org secrets); the CODE_REVIEW_ prefix is
          # de-prefixed to CLOUDFLARE_* by the CLI's env shim at startup.
          CODE_REVIEW_CLOUDFLARE_API_KEY: ${{ secrets.CODE_REVIEW_CLOUDFLARE_API_KEY }}
          CODE_REVIEW_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CODE_REVIEW_CLOUDFLARE_ACCOUNT_ID }}
          CODE_REVIEW_CLOUDFLARE_GATEWAY_ID: ${{ secrets.CODE_REVIEW_CLOUDFLARE_GATEWAY_ID }}
          # Review settings (org variables).
          CODE_REVIEW_MODEL: ${{ vars.CODE_REVIEW_MODEL }}
          CODE_REVIEW_DEPTH: ${{ vars.CODE_REVIEW_DEPTH }}
          CODE_REVIEW_THINKING_LEVEL: ${{ vars.CODE_REVIEW_THINKING_LEVEL }}
          CODE_REVIEW_VERIFY_MODEL: ${{ vars.CODE_REVIEW_VERIFY_MODEL }}
        run: node bin/code-review.js
