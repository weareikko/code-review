name: self-review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review pull request
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Forward the whole CODE_REVIEW_* namespace from org/repo vars + secrets
      # (settings, provider creds, OpenTelemetry via CODE_REVIEW_OTEL_*) — same
      # pattern as the reusable workflow; the CLI de-prefixes non-reserved ones.
      - name: Forward CODE_REVIEW_* config
        env:
          CR_VARS: ${{ toJSON(vars) }}
          CR_SECRETS: ${{ toJSON(secrets) }}
        run: |
          emit() {
            jq -r 'to_entries[]
                   | select(.key | test("^CODE_REVIEW_"; "i"))
                   | "\(.key)<<CR_EOF\n\(.value)\nCR_EOF"' <<<"$1" >> "$GITHUB_ENV"
          }
          emit "$CR_VARS"
          emit "$CR_SECRETS"
      - name: Run review
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node bin/code-review.js
