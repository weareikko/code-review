name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build package
        run: npm run build

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Determine npm tag and version
        run: |
          VERSION=${GITHUB_REF_NAME}
          NPM_TAG='latest'
          IS_PRERELEASE=false

          if [[ $VERSION =~ (alpha|beta|rc) ]]; then
            NPM_TAG='next'
            IS_PRERELEASE=true
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "NPM_TAG=$NPM_TAG" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV

      - name: Publish package
        # Auth is OIDC trusted publishing (id-token: write + --provenance); no npm token needed.
        run: npm publish --provenance --access public --tag ${{ env.NPM_TAG }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Please refer to [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ env.IS_PRERELEASE }}

      - name: Update moving version tags
        # Re-point the MAJOR (e.g. 0) and MAJOR.MINOR (e.g. 0.8) tags at this release
        # so consumers can pin `@0` or `@0.8` and pick up newer releases automatically,
        # à la actions/checkout. Semantics differ while pre-1.0: a 0.x minor bump marks
        # a breaking change, so `@0` tracks the latest stable release INCLUDING breaking
        # changes, whereas `@0.8` is the non-breaking patch channel (see the README pin
        # note). At 1.0, `@1` becomes a proper semver compatibility boundary.
        # Skipped for prereleases. Both tags have fewer than two dots, so they never
        # match the `*.*.*` publish trigger and cannot cause a re-run loop.
        if: env.IS_PRERELEASE == 'false'
        run: |
          MAJOR_TAG=${VERSION%%.*}
          MINOR_TAG=${VERSION%.*}
          for TAG in "$MAJOR_TAG" "$MINOR_TAG"; do
            git tag -f "$TAG"
            git push origin "refs/tags/$TAG" --force
          done
